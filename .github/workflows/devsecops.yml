name: Pipeline DevSecOps - Estudo de Caso

on:
  push:
    branches: [ main, stage, dev ]

jobs:
  # ETAPA 3: Build e Validação do Ambiente
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Atualizar ferramentas de Build e Instalar Dependências (Sem Cache)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install --no-cache-dir -r requirements.txt
          python -m compileall .

  # ETAPA 4: Análise Estática de Código (SAST)
  sast_security:
    runs-on: ubuntu-latest
    needs: build_and_test
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Executar Bandit (Python SAST)
        run: |
          pip install bandit
          bandit -r todo_project/ -f txt -o bandit-output.txt || true

      - name: Executar Safety (Checagem de Dependências)
        run: |
          pip install safety
          safety check -r requirements.txt --output text > safety-output.txt || true

      - name: Salvar Relatórios SAST
        uses: actions/upload-artifact@v4
        with:
          name: relatorios-sast
          path: |
            bandit-output.txt
            safety-output.txt

  # ETAPA 5 & 6: Deploy em Stage e DAST
  dast_security:
    runs-on: ubuntu-latest
    needs: sast_security
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Subir Aplicação no Docker (Ambiente de Stage)
        run: |
          docker build -t task-manager-stage .
          # Força o Flask a rodar em 0.0.0.0 dentro da rede do runner
          docker run -d --network="host" --name app-stage task-manager-stage sh -c "rsyslogd && python -m flask --app todo_project/run.py run --host=0.0.0.0 --port=8080"
          # Dá tempo para o Flask e o rsyslog iniciarem completamente
          sleep 15

      - name: Executar OWASP ZAP (Análise Dinâmica)
        run: |
          mkdir -p /home/runner/work/zap
          chmod 777 /home/runner/work/zap
          # O ZAP ataca o localhost:8080 que está exposto no host do runner
          docker run --user root --network="host" -v /home/runner/work/zap:/zap/wrk:rw ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t http://localhost:8080 -r zap-report.html || true

      - name: Salvar Relatório DAST (ZAP)
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-zap-dast
          path: /home/runner/work/zap/zap-report.html